# SwiftLint Configuration for Enterprise-Grade Development

# Rule Configuration
opt_in_rules:
  - anyobject_protocol
  - array_init
  - attributes
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_header
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - joined_default_parameter
  - legacy_random
  - let_var_whitespace
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - multiline_parameters_brackets
  - nimble_operator
  - nslocalizedstring_key
  - number_separator
  - object_literal
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - unused_import
  - unused_private_declaration
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

disabled_rules:
  - todo # We handle TODOs in pre-commit hook

# File Configuration
included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm
  - DerivedData
  - build
  - build_optimized

# Rule Customization
line_length:
  warning: 120
  error: 150

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 50
  error: 100

function_parameter_count:
  warning: 6
  error: 8

type_body_length:
  warning: 300
  error: 500

type_name:
  min_length: 3
  max_length: 40

identifier_name:
  min_length: 3
  max_length: 40
  excluded:
    - id
    - db
    - ui
    - os

# Documentation Requirements
file_header:
  required_pattern: |
                    \/\/
                    \/\/ .*\.swift
                    \/\/ LifeManager
                    \/\/
                    \/\/ Created by .* on .*
                    \/\/ Copyright © .* LifeManager\. All rights reserved\.
                    \/\/

# Custom Rules
custom_rules:
  no_print_statements:
    name: "No Print Statements"
    regex: '\bprint\s*\('
    message: "Use Logger.shared instead of print statements"
    severity: error

  no_nslog_statements:
    name: "No NSLog Statements"
    regex: '\bNSLog\s*\('
    message: "Use Logger.shared instead of NSLog statements"
    severity: error

  no_force_unwrapping:
    name: "No Force Unwrapping"
    regex: '!\s*(?!\=)'
    message: "Avoid force unwrapping. Use guard let or if let instead"
    severity: warning

  no_hardcoded_strings:
    name: "No Hardcoded Strings"
    regex: '"[^"]{50,}"'
    message: "Long strings should be localized or moved to constants"
    severity: warning

  proper_spacing_operators:
    name: "Proper Spacing Around Operators"
    regex: '[a-zA-Z0-9]\+[a-zA-Z0-9]|[a-zA-Z0-9]-[a-zA-Z0-9]|[a-zA-Z0-9]\*[a-zA-Z0-9]|[a-zA-Z0-9]/[a-zA-Z0-9]'
    message: "Operators should have spaces around them"
    severity: warning

# Reporter Configuration
reporter: "xcode"